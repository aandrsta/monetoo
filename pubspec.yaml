name: Monetoo
description: Aplikasi Pencatatan Keuangan Pribadi
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_nav_bar: ^5.0.7

  # Charts untuk laporan
  fl_chart: ^0.66.2

  # Date picker
  table_calendar: ^3.0.9

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  fonts:
    - family: SFProText
      fonts:
        - asset: assets/fonts/SF-Pro-Text-Medium.otf
          weight: 500

  # assets:
  #   - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Monetoo_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F8F9FF"
